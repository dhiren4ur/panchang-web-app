<!DOCTYPE html>
<html lang="gu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ધાર્મિક વૉલપેપર</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Gujarati:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans Gujarati',sans-serif;background:#0d0600;min-height:100vh;color:#fff}

.top-bar{background:linear-gradient(135deg,#b33000,#e65c00,#ff8c00);padding:14px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50;box-shadow:0 3px 12px rgba(0,0,0,0.5)}
.back-btn{background:rgba(255,255,255,0.18);border:1.5px solid rgba(255,255,255,0.5);color:#fff;border-radius:8px;padding:5px 12px;font-size:13px;cursor:pointer;font-family:inherit;flex-shrink:0;white-space:nowrap}
.top-title{color:#fff;font-size:18px;font-weight:700;flex:1;text-align:center;text-shadow:1px 1px 3px rgba(0,0,0,0.4)}
.top-count{font-size:12px;color:rgba(255,255,255,0.85);background:rgba(0,0,0,0.3);padding:3px 9px;border-radius:10px;flex-shrink:0}

.search-bar{padding:10px 12px;background:#180800;border-bottom:1px solid rgba(255,102,0,0.25);display:flex;align-items:center;gap:8px}
.search-input{flex:1;background:#2a1000;border:1.5px solid rgba(255,102,0,0.35);border-radius:10px;color:#fff;padding:9px 14px;font-size:14px;font-family:inherit;outline:none}
.search-input::placeholder{color:rgba(255,153,51,0.45)}
.search-input:focus{border-color:rgba(255,153,51,0.75)}
.search-clear{background:rgba(255,102,0,0.25);border:none;color:rgba(255,153,51,0.8);border-radius:8px;padding:8px 12px;font-size:13px;cursor:pointer;white-space:nowrap;display:none}
.search-clear.show{display:block}

.stats-bar{padding:7px 14px;background:#0f0500;display:flex;align-items:center;justify-content:space-between}
.stats-txt{font-size:11px;color:rgba(255,153,51,0.6)}

.gallery-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;padding:2px;background:#0d0600;min-height:200px}
@media(min-width:480px){.gallery-grid{grid-template-columns:repeat(4,1fr)}}
@media(min-width:700px){.gallery-grid{grid-template-columns:repeat(5,1fr)}}

.gi{aspect-ratio:9/16;position:relative;overflow:hidden;cursor:pointer;background:#1a0900;-webkit-tap-highlight-color:transparent}
.gi img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .2s}
.gi:active img{transform:scale(0.95)}
.gi-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.4) 0%,transparent 50%);pointer-events:none}
.gi.hidden{display:none}
.ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:28px;opacity:.3;background:linear-gradient(135deg,#1a0900,#2a1200)}

.no-results{padding:48px 20px;text-align:center;color:rgba(255,153,51,0.45);font-size:14px;display:none}
.loading-box{padding:48px 20px;text-align:center;color:rgba(255,153,51,0.5);font-size:14px}

.lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.97);z-index:200;flex-direction:column;align-items:center;justify-content:center}
.lb.open{display:flex}
.lb-top{position:absolute;top:0;left:0;right:0;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(to bottom,rgba(0,0,0,0.88),transparent);z-index:10}
.lb-close{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.lb-img-wrap{width:100%;height:100%;display:flex;align-items:center;justify-content:center;padding:52px 10px 90px}
.lb-img-wrap img{max-width:100%;max-height:100%;object-fit:contain;border-radius:6px}
.lb-ctr{font-size:12px;color:rgba(255,255,255,0.6)}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);width:42px;height:42px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);border-radius:50%;color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;-webkit-tap-highlight-color:transparent}
.lb-prev{left:6px}
.lb-next{right:6px}
.lb-bottom{position:absolute;bottom:0;left:0;right:0;padding:14px 16px;display:flex;gap:10px;justify-content:center;background:linear-gradient(to top,rgba(0,0,0,0.9),transparent)}
.lb-btn{flex:1;max-width:185px;padding:13px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;border:none;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:7px}
.lb-dl{background:linear-gradient(135deg,#e65c00,#ff9933);color:#fff;box-shadow:0 3px 0 #a33c00}
.lb-sh{background:rgba(255,255,255,0.1);color:#fff;border:1.5px solid rgba(255,255,255,0.25)}
</style>
</head>
<body>

<div class="top-bar">
    <button class="back-btn" onclick="history.back()">← પાછળ</button>
    <span class="top-title">🙏 ધાર્મિક વૉલપેપર</span>
    <span class="top-count" id="top-count">...</span>
</div>

<div class="search-bar">
    <input class="search-input" id="search" type="search" placeholder="શોધો... (hanuman, krishna, sai...)" oninput="doSearch()">
    <button class="search-clear" id="search-clear" onclick="clearSearch()">✕ Clear</button>
</div>

<div class="stats-bar">
    <span class="stats-txt" id="stats-txt">Loading...</span>
    <span class="stats-txt">📱 9:16 Mobile Wallpaper</span>
</div>

<div class="gallery-grid" id="grid">
    <div class="loading-box" style="grid-column:1/-1">Loading wallpapers...</div>
</div>
<div class="no-results" id="no-results">કોઈ વૉલપેપર મળ્યા નહીં.</div>

<div class="lb" id="lb">
    <div class="lb-top">
        <button class="lb-close" onclick="closeLb()">✕</button>
        <span class="lb-ctr" id="lb-ctr"></span>
    </div>
    <div class="lb-img-wrap"><img id="lb-img" src="" alt=""></div>
    <button class="lb-nav lb-prev" onclick="lbGo(-1)">‹</button>
    <button class="lb-nav lb-next" onclick="lbGo(1)">›</button>
    <div class="lb-bottom">
        <button class="lb-btn lb-dl" onclick="dlImg()">⬇ ડાઉનલોડ</button>
        <button class="lb-btn lb-sh" onclick="shareImg()">↗ શૅર</button>
    </div>
</div>

<script>
const DIR = 'wallpapers/';
let ALL = [];       // full list from PHP
let VIS = [];       // currently visible indices into ALL
let LB_IDX = 0;

/* ── Load images from PHP ── */
async function loadImages() {
    try {
        const res  = await fetch('wallpapers.php');
        const data = await res.json();
        if (!data.success || !data.images.length) {
            document.getElementById('grid').innerHTML =
                '<div class="loading-box" style="grid-column:1/-1">No wallpapers found.<br>Upload images to wallpapers/ folder.</div>';
            return;
        }
        ALL = data.images;
        document.getElementById('top-count').textContent = ALL.length;
        buildGrid();
        updateStats(ALL.length);
    } catch(e) {
        document.getElementById('grid').innerHTML =
            '<div class="loading-box" style="grid-column:1/-1">Error loading wallpapers.</div>';
    }
}

/* ── Build grid ── */
function buildGrid() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    ALL.forEach((w, i) => {
        const d = document.createElement('div');
        d.className = 'gi';
        d.dataset.i    = i;
        d.dataset.name = w.name.toLowerCase();  // for search
        d.innerHTML = `
            <img src="${DIR}${w.file}" alt="${w.label}" loading="lazy"
                 onerror="this.parentElement.innerHTML='<div class=ph>🙏</div>'">
            <div class="gi-ov"></div>`;
        d.addEventListener('click', () => openLb(i));
        grid.appendChild(d);
    });
}

/* ── Search ── */
function doSearch() {
    const q = document.getElementById('search').value.trim().toLowerCase();
    document.getElementById('search-clear').classList.toggle('show', q.length > 0);

    const items = document.querySelectorAll('.gi');
    let visible = 0;
    items.forEach(el => {
        // Match against full filename (name field) so "radha" finds "radha_krishna"
        const matches = !q || el.dataset.name.includes(q);
        el.classList.toggle('hidden', !matches);
        if (matches) visible++;
    });

    document.getElementById('no-results').style.display = visible === 0 && q ? 'block' : 'none';
    updateStats(visible);
}

function clearSearch() {
    document.getElementById('search').value = '';
    document.getElementById('search-clear').classList.remove('show');
    document.querySelectorAll('.gi').forEach(el => el.classList.remove('hidden'));
    document.getElementById('no-results').style.display = 'none';
    updateStats(ALL.length);
}

function updateStats(n) {
    const q = document.getElementById('search').value.trim();
    document.getElementById('stats-txt').textContent = q
        ? `"${q}" — ${n} results`
        : `${n} વૉલપેપર`;
}

/* ── Lightbox ── */
function getVisibleIndices() {
    return [...document.querySelectorAll('.gi:not(.hidden)')].map(el => +el.dataset.i);
}

function openLb(globalIdx) {
    VIS = getVisibleIndices();
    LB_IDX = VIS.indexOf(globalIdx);
    if (LB_IDX < 0) LB_IDX = 0;
    showLb();
    document.getElementById('lb').classList.add('open');
    document.body.style.overflow = 'hidden';
}

function showLb() {
    const w = ALL[VIS[LB_IDX]];
    document.getElementById('lb-img').src = DIR + w.file;
    document.getElementById('lb-ctr').textContent = (LB_IDX + 1) + ' / ' + VIS.length;
}

function lbGo(d) { LB_IDX = (LB_IDX + d + VIS.length) % VIS.length; showLb(); }

function closeLb() {
    document.getElementById('lb').classList.remove('open');
    document.body.style.overflow = '';
}

/* ── Download ── */
function dlImg() {
    const w = ALL[VIS[LB_IDX]];
    const a = document.createElement('a');
    a.href = DIR + w.file; a.download = w.file;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

/* ── Share ── */
async function shareImg() {
    const w = ALL[VIS[LB_IDX]];
    const url = location.origin + location.pathname.replace('wallpaper.html','') + DIR + w.file;
    if (navigator.share) {
        try { await navigator.share({title: w.label + ' Wallpaper', url}); } catch(e){}
    } else {
        navigator.clipboard?.writeText(url).then(() => alert('Link copied!'));
    }
}

/* ── Swipe ── */
let tx = 0;
const lb = document.getElementById('lb');
lb.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, {passive:true});
lb.addEventListener('touchend',   e => {
    const dx = e.changedTouches[0].clientX - tx;
    if (Math.abs(dx) > 45) lbGo(dx < 0 ? 1 : -1);
});

/* ── Keyboard ── */
document.addEventListener('keydown', e => {
    if (!lb.classList.contains('open')) return;
    if (e.key==='ArrowRight') lbGo(1);
    if (e.key==='ArrowLeft')  lbGo(-1);
    if (e.key==='Escape')     closeLb();
});

/* ── Init ── */
loadImages();
</script>
</body>
</html>
